<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - Hangman</title>
    <link rel="icon" type="image/jpeg" href="../hangman-game-images/images/head.jpg">
    <link rel="stylesheet" href="../css/index.css">
    <style>
        .stats-container {
            max-width: 700px;
            width: 90%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.5s ease;
        }

        .stats-title {
            font-size: 36px;
            margin-bottom: 30px;
            color: #ffd700;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255,215,0,0.1);
            border-color: #ffd700;
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
        }

        .achievement-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .achievement-section h3 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .achievement-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .achievement-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .achievement-icon {
            font-size: 24px;
            width: 50px;
            height: 50px;
            background: rgba(255,215,0,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .achievement-progress {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            width: 0%;
            transition: width 0.3s ease;
        }

        .nav-button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-button:hover {
            background: #ffd700;
            color: black;
            transform: translateY(-2px);
        }

        .reset-btn {
            background: rgba(255, 68, 68, 0.3);
            border: 1px solid rgba(255, 68, 68, 0.5);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            border: none;
        }

        .reset-btn:hover {
            background: rgba(255, 68, 68, 0.5);
            transform: translateY(-2px);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="home-body">
    <div class="stats-container">
        <h1 class="stats-title">📊 STATISTICS</h1>
        
        <div class="stats-grid" id="statsGrid">
            <!-- Filled by JavaScript -->
        </div>

        <div class="achievement-section">
            <h3>🏆 ACHIEVEMENTS</h3>
            <div class="achievement-list" id="achievementsList">
                <!-- Filled by JavaScript -->
            </div>
        </div>

        <div class="button-group">
            <a href="index.html" class="nav-button">← Home</a>
            <button class="reset-btn" id="resetStatsBtn">Reset Statistics</button>
        </div>
    </div>

    <script>
        function loadStats() {
            const streak = parseInt(localStorage.getItem('hangman_streak') || '0');
            const freeLetters = parseInt(localStorage.getItem('hangman_freeLetters') || '3');
            const highestStreak = parseInt(localStorage.getItem('hangman_highestStreak') || '0');
            
            // Calculate other stats
            let gamesWon = parseInt(localStorage.getItem('hangman_gamesWon') || '0');
            let gamesLost = parseInt(localStorage.getItem('hangman_gamesLost') || '0');
            let totalGames = gamesWon + gamesLost;
            let winRate = totalGames > 0 ? Math.round((gamesWon / totalGames) * 100) : 0;

            // Stats grid
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-label">Current Streak</div>
                    <div class="stat-number">${streak}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎁</div>
                    <div class="stat-label">Free Letters</div>
                    <div class="stat-number">${freeLetters}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👑</div>
                    <div class="stat-label">Highest Streak</div>
                    <div class="stat-number">${highestStreak}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-label">Win Rate</div>
                    <div class="stat-number">${winRate}%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🏆</div>
                    <div class="stat-label">Games Won</div>
                    <div class="stat-number">${gamesWon}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💔</div>
                    <div class="stat-label">Games Lost</div>
                    <div class="stat-number">${gamesLost}</div>
                </div>
            `;

            // Achievements
            const achievements = [
                { name: 'First Win', icon: '🏆', condition: gamesWon >= 1, progress: gamesWon >= 1 ? 100 : 0 },
                { name: 'Streak Master', icon: '🔥', condition: highestStreak >= 5, progress: Math.min((highestStreak / 5) * 100, 100) },
                { name: 'Perfect Game', icon: '⭐', condition: false, progress: 0 }, // You'll need to track this
                { name: 'Word Master', icon: '📚', condition: gamesWon >= 10, progress: Math.min((gamesWon / 10) * 100, 100) },
            ];

            document.getElementById('achievementsList').innerHTML = achievements.map(ach => `
                <div class="achievement-item">
                    <div class="achievement-icon">${ach.icon}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${ach.name}</div>
                        <div class="achievement-progress">
                            <div class="progress-bar" style="width: ${ach.progress}%;"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('resetStatsBtn').addEventListener('click', () => {
            if (confirm('Are you sure you want to reset all statistics?')) {
                localStorage.removeItem('hangman_streak');
                localStorage.removeItem('hangman_freeLetters');
                localStorage.removeItem('hangman_highestStreak');
                localStorage.removeItem('hangman_gamesWon');
                localStorage.removeItem('hangman_gamesLost');
                loadStats();
            }
        });

        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
